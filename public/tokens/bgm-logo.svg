<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2d0052"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%"   stop-color="#e879f9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#db2777" stroke-width="1.5" opacity="0.5"/>

  <!-- Goose body -->
  <ellipse cx="100" cy="118" rx="38" ry="32" fill="url(#body)"/>

  <!-- Wing -->
  <ellipse cx="116" cy="122" rx="22" ry="14" fill="url(#wing)" transform="rotate(-15 116 122)"/>

  <!-- Neck -->
  <ellipse cx="88" cy="90" rx="13" ry="20" fill="url(#body)" transform="rotate(-10 88 90)"/>

  <!-- Head -->
  <circle cx="83" cy="70" r="15" fill="url(#body)"/>

  <!-- Beak -->
  <polygon points="68,68 60,72 68,75" fill="#e879f9"/>

  <!-- Eye -->
  <circle cx="79" cy="66" r="3.5" fill="#0d0020"/>
  <circle cx="78" cy="65" r="1.2" fill="#e879f9"/>

  <!-- Legs -->
  <line x1="94"  y1="148" x2="90"  y2="164" stroke="#db2777" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="148" x2="112" y2="164" stroke="#db2777" stroke-width="3" stroke-linecap="round"/>
  <line x1="90"  y1="164" x2="83"  y2="168" stroke="#db2777" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90"  y1="164" x2="90"  y2="170" stroke="#db2777" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="164" x2="119" y2="168" stroke="#db2777" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="164" x2="112" y2="170" stroke="#db2777" stroke-width="2.5" stroke-linecap="round"/>

  <!-- $BGM label -->
  <text x="100" y="192" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold"
        fill="#e879f9" letter-spacing="2" opacity="0.85">$BGM</text>
</svg>
